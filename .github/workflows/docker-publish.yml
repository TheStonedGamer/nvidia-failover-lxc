name: Build and publish Docker image

# Builds the proxy image and pushes it to Docker Hub.
# Requires two repository secrets:
#   DOCKERHUB_USERNAME  — your Docker Hub username
#   DOCKERHUB_TOKEN     — a Docker Hub access token (Account Settings → Security)
# The image is published as:  <DOCKERHUB_USERNAME>/nvidia-failover-proxy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: nvidia-failover-proxy

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Detect whether Docker Hub credentials are configured. Without them we
      # still build (to prove the image compiles) but skip login/push instead
      # of failing the whole workflow.
      - name: Check for Docker Hub credentials
        id: creds
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            echo "has=true"  >> "$GITHUB_OUTPUT"
            echo "user=$DOCKERHUB_USERNAME" >> "$GITHUB_OUTPUT"
          else
            echo "has=false" >> "$GITHUB_OUTPUT"
            echo "user=local" >> "$GITHUB_OUTPUT"
            echo "::notice::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN not set — building image without pushing."
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Log in + push only when creds exist and this isn't a PR.
      - name: Log in to Docker Hub
        if: steps.creds.outputs.has == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.creds.outputs.user }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build (and push if credentials are set)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.creds.outputs.has == 'true' && github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
