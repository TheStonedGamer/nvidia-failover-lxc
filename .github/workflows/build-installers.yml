name: Build self-contained installers

# Builds standalone, no-Python-required executables and native installers for
# Windows, macOS (Intel + Apple Silicon) and Linux (AppImage) with PyInstaller.
# Every push to main auto-publishes a rolling "latest" release; pushing a v*
# tag publishes a permanent versioned release. Also runnable manually.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "app/**"
      - "requirements.txt"
      - "packaging/**"
      - ".github/workflows/build-installers.yml"
  workflow_dispatch:

permissions:
  contents: write

# One release at a time; cancel superseded main builds.
concurrency:
  group: installers-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
          - os: ubuntu-latest
            target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # Version: v-tag -> that version; otherwise 0.0.<run_number> rolling build.
      - name: Compute version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      # ---- Build the one-file executable (all platforms) --------------------
      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller --onefile --name nvidia-failover-proxy
          --collect-submodules uvicorn
          --add-data "app/templates;app/templates"
          --add-data "app/static;app/static"
          --icon packaging/icon.ico
          -p . app/main.py

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: >
          pyinstaller --onefile --name nvidia-failover-proxy
          --collect-submodules uvicorn
          --add-data "app/templates:app/templates"
          --add-data "app/static:app/static"
          -p . app/main.py

      # ---- Package: Windows installer (Inno Setup) --------------------------
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.value }}"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver packaging\windows-installer.iss
          New-Item -ItemType Directory -Force out | Out-Null
          Copy-Item dist\nvidia-failover-proxy.exe "out\nvidia-failover-proxy-${{ matrix.target }}.exe"
          Copy-Item installer\nvidia-failover-proxy-setup.exe "out\nvidia-failover-proxy-setup-${{ matrix.target }}.exe"

      # ---- Package: Linux AppImage -----------------------------------------
      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        run: |
          set -e
          mkdir -p out AppDir/usr/bin
          cp dist/nvidia-failover-proxy AppDir/usr/bin/nvidia-failover-proxy
          chmod +x AppDir/usr/bin/nvidia-failover-proxy
          cp packaging/nvidia-failover-proxy.desktop AppDir/nvidia-failover-proxy.desktop
          cp packaging/icon.png AppDir/nvidia-failover-proxy.png
          cat > AppDir/AppRun <<'SH'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/nvidia-failover-proxy" "$@"
          SH
          chmod +x AppDir/AppRun
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir \
            "out/nvidia-failover-proxy-${{ matrix.target }}.AppImage"
          cp dist/nvidia-failover-proxy "out/nvidia-failover-proxy-${{ matrix.target }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: out/*

  # Single release job so the 4 matrix builds don't race to create the release.
  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Collect assets
        run: |
          mkdir -p release
          find dist-artifacts -type f -exec cp {} release/ \;
          ls -la release

      # Tag push -> permanent versioned release.
      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*

      # main push / manual -> rolling "latest" prerelease, tag moved each time.
      - name: Publish rolling latest release
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest build (0.0.${{ github.run_number }})"
          prerelease: true
          body: "Automated build from ${{ github.sha }} on ${{ github.ref_name }}. This release is overwritten on every push to main."
          files: release/*
