name: Build self-contained installers

# Builds standalone, no-Python-required executables and native installers for
# Windows, macOS (Intel + Apple Silicon) and Linux (AppImage) with PyInstaller.
# Runs on every v* tag (assets are attached to the GitHub Release) and can be
# triggered manually (assets are uploaded as workflow artifacts).

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows-x64
          - os: macos-13
            target: macos-x64
          - os: macos-latest
            target: macos-arm64
          - os: ubuntu-latest
            target: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # ---- Build the one-file executable (all platforms) --------------------
      - name: Build executable (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller --onefile --name nvidia-failover-proxy
          --collect-submodules uvicorn
          --icon packaging/icon.ico
          nvidia_failover_proxy.py

      - name: Build executable (macOS)
        if: runner.os == 'macOS'
        run: >
          pyinstaller --onefile --name nvidia-failover-proxy
          --collect-submodules uvicorn
          --icon packaging/icon.icns
          nvidia_failover_proxy.py

      - name: Build executable (Linux)
        if: runner.os == 'Linux'
        run: >
          pyinstaller --onefile --name nvidia-failover-proxy
          --collect-submodules uvicorn
          nvidia_failover_proxy.py

      # ---- Package: Windows installer (Inno Setup) --------------------------
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          if (-not $ver) { $ver = "0.0.0" }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" /DMyAppVersion=$ver packaging\windows-installer.iss
          New-Item -ItemType Directory -Force out | Out-Null
          Copy-Item dist\nvidia-failover-proxy.exe "out\nvidia-failover-proxy-${{ matrix.target }}.exe"
          Copy-Item installer\nvidia-failover-proxy-setup.exe "out\nvidia-failover-proxy-setup-${{ matrix.target }}.exe"

      # ---- Package: macOS .dmg ---------------------------------------------
      - name: Build macOS dmg
        if: runner.os == 'macOS'
        run: |
          mkdir -p out dmgroot
          cp dist/nvidia-failover-proxy dmgroot/nvidia-failover-proxy
          cp README.md dmgroot/README.md
          chmod +x dmgroot/nvidia-failover-proxy
          hdiutil create -volname "NVIDIA Failover Proxy" -srcfolder dmgroot -ov -format UDZO \
            "out/nvidia-failover-proxy-${{ matrix.target }}.dmg"
          cp dist/nvidia-failover-proxy "out/nvidia-failover-proxy-${{ matrix.target }}"

      # ---- Package: Linux AppImage -----------------------------------------
      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        run: |
          set -e
          mkdir -p out AppDir/usr/bin
          cp dist/nvidia-failover-proxy AppDir/usr/bin/nvidia-failover-proxy
          chmod +x AppDir/usr/bin/nvidia-failover-proxy
          cp packaging/nvidia-failover-proxy.desktop AppDir/nvidia-failover-proxy.desktop
          cp packaging/icon.png AppDir/nvidia-failover-proxy.png
          cat > AppDir/AppRun <<'SH'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/nvidia-failover-proxy" "$@"
          SH
          chmod +x AppDir/AppRun
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir \
            "out/nvidia-failover-proxy-${{ matrix.target }}.AppImage"
          cp dist/nvidia-failover-proxy "out/nvidia-failover-proxy-${{ matrix.target }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: out/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
